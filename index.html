<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#f7f4ef" />
  <title>Natural Wonder Beauty Creation — Services</title>

  <!-- Fonts (falls back gracefully to system fonts if offline) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ===================== HEADER ===================== -->
  <header class="site-header">
    <button id="lang-toggle" class="lang-toggle" type="button" aria-label="切换到中文">中文</button>
    <div class="header-inner">
      <p class="eyebrow" id="header-eyebrow">San Francisco</p>
      <h1 class="studio-name" id="studio-name">Natural Wonder Beauty Creation</h1>
      <p class="tagline" id="studio-tagline">Advanced skincare &amp; beauty, crafted with care</p>
    </div>
  </header>

  <!-- ===================== SEARCH ===================== -->
  <div class="search-wrap">
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M21 21l-4.35-4.35M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input id="search-input" type="search" inputmode="search" autocomplete="off"
             placeholder="Search services…" aria-label="Search services" />
      <button id="search-clear" class="search-clear" aria-label="Clear search" hidden>&times;</button>
    </div>
  </div>

  <!-- ===================== CATEGORY NAV ===================== -->
  <nav class="category-nav" id="category-nav" aria-label="Service categories"></nav>

  <!-- ===================== SERVICES ===================== -->
  <main class="content" id="content">
    <!-- Categories & services are rendered here by app.js -->
  </main>

  <!-- "No results" message (shown during search) -->
  <p class="no-results" id="no-results" hidden>No services match your search.</p>

  <!-- ===================== FOOTER ===================== -->
  <footer class="site-footer">
    <p class="footer-name" id="footer-name">Natural Wonder Beauty Creation</p>
    <p class="eyebrow footer-eyebrow" id="footer-eyebrow">San Francisco</p>
  </footer>

  <!-- Data first, then translations, then the app -->
  <script src="services.js"></script>
  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
